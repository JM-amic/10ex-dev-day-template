# Standalone E2E stack: `make e2e-up` / `make e2e-down`.
#
# Deliberately NOT an overlay on docker-compose.yml -- it defines its own
# Temporal/worker/trigger services on distinct container names and host ports
# so it can run side by side with the regular `make up` dev stack without
# colliding with it. It reaches the SAME already-running local Supabase
# instance (CLI-managed, singleton) via host.docker.internal, same as the dev
# stack does -- spinning up a second Supabase is not practical.
#
# The worker's Azure OpenAI call is pointed at a local deterministic stub
# (e2e/stub-llm) instead of the real endpoint, so Playwright can drive the
# full round trip with no external credentials and no network egress.
#
# The frontend itself is NOT run in Docker here (this template's `frontend`
# compose service isn't part of the normal dev loop -- `npm run dev` is).
# Playwright's `webServer` config starts the Vite dev server directly,
# pointed at temporal-trigger-e2e below.
name: 10x-stack-e2e

services:
  temporal-db-e2e:
    image: postgres:15-alpine
    container_name: temporal-db-e2e
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal-e2e:
    image: temporalio/auto-setup:1.21.3
    container_name: temporal-e2e
    depends_on:
      temporal-db-e2e:
        condition: service_healthy
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db-e2e
      - TEMPORAL_CLI_ADDRESS=localhost:7233
    ports:
      - "7235:7233"
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      timeout: 5s
      retries: 5

  stub-llm:
    build: ./e2e/stub-llm
    container_name: stub-llm-e2e

  temporal-worker-e2e:
    build: ./temporal
    container_name: temporal-worker-e2e
    depends_on:
      temporal-e2e:
        condition: service_started
      stub-llm:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TEMPORAL_ADDRESS=temporal-e2e:7233
      - TEMPORAL_NAMESPACE=default
      - TEMPORAL_TASK_QUEUE=main
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-dev-service-role-key}
      - AZURE_OPENAI_ENDPOINT=http://stub-llm:9000/openai/responses
      - AZURE_OPENAI_API_VERSION=2025-04-01-preview
      - AZURE_OPENAI_MODEL=stub-model
      - AZURE_OPENAI_API_KEY=stub-key

  temporal-trigger-e2e:
    build: ./temporal
    container_name: temporal-trigger-e2e
    command: ["uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      temporal-e2e:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TEMPORAL_ADDRESS=temporal-e2e:7233
      - TEMPORAL_NAMESPACE=default
      - TEMPORAL_TASK_QUEUE=main
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-dev-service-role-key}
      - TRIGGER_CORS_ORIGIN=http://localhost:3001
    ports:
      - "8001:8000"
