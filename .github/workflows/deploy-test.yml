name: Deploy Test

# Phase 2 (#41/#44): promote a previously-built set of images to the `<TEST_NAMESPACE>`
# namespace.  Triggered manually by a release manager once dev smoke passes.
#
# GATED: until Phase 2 is enabled the deploy job is skipped cleanly.  To enable,
# set K8S_DEPLOY_ENABLED=true, TEST_NAMESPACE, and the KUBE_CONFIG_TEST
# secret.  See docs/specs/live-cluster-deploy-smoke-rollback.md.
#
# Promotion carries the SAME image digests that were captured by build-images.yml
# (ADR-0010).  The caller must supply the run ID of the Build Images run; there is
# no tag-only fallback — a missing or unreadable digest artifact is a hard failure.
#
# NOTE: per spec, the helm/kubectl step should eventually move to the
# `factory-deploy-nonprod` self-hosted runner once that runner is provisioned.

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: 'Run ID of the Build Images workflow run to promote (required; find it in the Actions tab)'
        required: true
        type: string
      sha_tag:
        description: 'Commit SHA for audit display (optional; defaults to "build-<run_id>" when omitted)'
        required: false
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-test
  cancel-in-progress: false   # Never silently discard a test promotion

jobs:
  preflight:
    name: Preflight (gate)
    runs-on: ubuntu-latest
    outputs:
      app_enabled: ${{ steps.gate.outputs.app_enabled }}
    steps:
      - id: gate
        env:
          DEPLOY_ENABLED: ${{ vars.K8S_DEPLOY_ENABLED }}
          TEST_NAMESPACE: ${{ vars.TEST_NAMESPACE }}
          HAS_DEPLOY_KUBECONFIG: ${{ secrets.KUBE_CONFIG_TEST != '' }}
        run: |
          APP_ENABLED=false
          if [[ "$DEPLOY_ENABLED" == "true" && -n "$TEST_NAMESPACE" && "$HAS_DEPLOY_KUBECONFIG" == "true" ]]; then
            APP_ENABLED=true
          fi
          echo "app_enabled=$APP_ENABLED" >> "$GITHUB_OUTPUT"
          {
            echo "## Deploy Test preflight"
            echo ""
            echo "| Gate | Status |"
            echo "|------|--------|"
            if [ "$APP_ENABLED" = true ]; then
              echo "| App deploy (frontend + worker) | ✅ enabled → \`$TEST_NAMESPACE\` |"
            else
              echo "| App deploy (frontend + worker) | ⏭️ skipped — needs K8S_DEPLOY_ENABLED + TEST_NAMESPACE + KUBE_CONFIG_TEST |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy app to <TEST_NAMESPACE>
    needs: preflight
    if: needs.preflight.outputs.app_enabled == 'true'
    runs-on: ubuntu-latest   # TODO: move to factory-deploy-nonprod per spec once provisioned
    environment: test
    env:
      TEST_NAMESPACE: ${{ vars.TEST_NAMESPACE }}
      IMAGE_REGISTRY: ${{ vars.ACR_LOGIN_SERVER }}
    steps:
      - uses: actions/checkout@v4

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.3

      - name: Configure kubeconfig (namespace-scoped gha-deployer)
        run: |
          install -m 600 /dev/null "$RUNNER_TEMP/kubeconfig"
          echo "${{ secrets.KUBE_CONFIG_TEST }}" > "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"

      - name: Download image digests from Build Images run
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.build_run_id }}
          pattern: image-digest-*
          path: /tmp/digests/
          merge-multiple: false

      - name: Resolve and validate image digests
        id: digests
        run: |
          set -euo pipefail
          FRONTEND_DIGEST=""
          WORKER_DIGEST=""
          if [[ -f /tmp/digests/image-digest-frontend/digest.txt ]]; then
            FRONTEND_DIGEST=$(tr -d '[:space:]' < /tmp/digests/image-digest-frontend/digest.txt)
          fi
          if [[ -f /tmp/digests/image-digest-temporal-worker/digest.txt ]]; then
            WORKER_DIGEST=$(tr -d '[:space:]' < /tmp/digests/image-digest-temporal-worker/digest.txt)
          fi
          if [[ -z "${FRONTEND_DIGEST}" ]]; then
            echo "::error::frontend image digest missing from build run ${{ inputs.build_run_id }} — ADR-0010 requires pinned digests for promotion" >&2
            exit 1
          fi
          if [[ -z "${WORKER_DIGEST}" ]]; then
            echo "::error::temporal-worker image digest missing from build run ${{ inputs.build_run_id }} — ADR-0010 requires pinned digests for promotion" >&2
            exit 1
          fi
          echo "frontend=${FRONTEND_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "worker=${WORKER_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Resolve image tag (for audit display)
        id: img
        run: |
          SHA_TAG="${{ inputs.sha_tag }}"
          echo "tag=${SHA_TAG:-build-${{ inputs.build_run_id }}}" >> "$GITHUB_OUTPUT"

      - name: Helm upgrade (<TEST_NAMESPACE>)
        run: |
          set -euo pipefail
          helm upgrade --install rental-app charts/app \
            -f charts/app/values-test.yaml \
            --namespace "$TEST_NAMESPACE" \
            --set "imageRegistry=${IMAGE_REGISTRY}" \
            --set "frontend.image.digest=${{ steps.digests.outputs.frontend }}" \
            --set "frontend.image.tag=${{ steps.img.outputs.tag }}" \
            --set "temporalWorker.image.digest=${{ steps.digests.outputs.worker }}" \
            --set "temporalWorker.image.tag=${{ steps.img.outputs.tag }}" \
            --set "opsApi.image.digest=${{ steps.digests.outputs.worker }}" \
            --set "opsApi.image.tag=${{ steps.img.outputs.tag }}" \
            --wait --timeout 10m

      - name: Deploy summary
        if: always()
        run: |
          {
            echo "## Deploy Test → $TEST_NAMESPACE"
            echo "- build run: ${{ inputs.build_run_id }}"
            echo "- frontend digest: ${{ steps.digests.outputs.frontend }}"
            echo "- worker digest: ${{ steps.digests.outputs.worker }}"
            echo "- tag (audit): ${{ steps.img.outputs.tag }}"
            echo "- next: smoke-dev-test-prod.yml (Phase 2 follow-up)"
          } >> "$GITHUB_STEP_SUMMARY"
