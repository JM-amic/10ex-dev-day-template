repository:
  owner: <ORG>
  name: <REPO_NAME>
  default_branch: main
  project_owner: <ORG>
  project_number: 0   # set your GitHub Project board number

factory:
  # Keep the pipeline full: the PM fills up to this many concurrent Copilot PRs each
  # run. Raised 3 → 8 so the ~15-min single-pass fast pipeline always has work in
  # flight. Trade-off: more concurrent PRs = more shared-file merge conflicts/drift;
  # mitigated by the PM's contamination re-kick + the honest push:main validation gate.
  max_open_copilot_prs: 8
  auto_merge_low_risk: false
  active_runner_profile: github-hosted-mvp
  # Default per-agent work-phase budget (minutes). Heavy agents (tech-reviewer,
  # factory-architect) override with `timeout_minutes` in their frontmatter.
  agent_timeout_minutes: 10

runners:
  default_agent: ubuntu-latest
  github_hosted: ubuntu-latest
  self_hosted:
    build: [self-hosted, linux, x64, factory-build]
    deploy_nonprod: [self-hosted, linux, x64, factory-deploy-nonprod]
    prod_ops: [self-hosted, linux, x64, factory-prod-ops]
    cluster_guardian: [self-hosted, linux, x64, factory-cluster-guardian]

stack:
  frontend: vite-react
  worker: temporal-python
  database: supabase-postgres
  deployment: docker-compose
  deployment_profiles:
    - local-compose
    - kubernetes-app

cluster_guardian:
  allowed_namespaces:
    - <DEV_NAMESPACE>
    - <TEST_NAMESPACE>
  issue_label: auto:cluster

ops:
  namespace_prefix: <NAMESPACE_PREFIX>
  aks_cluster_nonprod: <AKS_CLUSTER_NONPROD>
  aks_resource_group_nonprod: <AKS_RESOURCE_GROUP_NONPROD>
  acr_name_nonprod: <ACR_NAME_NONPROD>
  supabase_namespace: <SUPABASE_NAMESPACE>
  supabase_backup_target: supabase-postgres

commands:
  frontend_lint:
    cmd: "npm --prefix frontend run lint"
    optional: false
  frontend_build:
    cmd: "npm --prefix frontend run build"
    optional: false
  frontend_test:
    cmd: "npm --prefix frontend test -- --run"
    optional: true   # no test script yet; skip gracefully
  worker_test:
    cmd: "python -m pytest temporal/tests"
    optional: true   # no tests yet; skip gracefully
  db_validate:
    cmd: "supabase db reset --config supabase/config.toml"
    optional: true   # requires local Supabase stack
