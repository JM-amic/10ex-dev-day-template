name: 10x-stack-template

# The full local Supabase stack (API/Kong, Auth, Storage, Studio, Postgres) is
# run by the Supabase CLI via `supabase start`, NOT by this compose file --
# `make up` starts it first. Services below reach it on the host:
#   browser/frontend      -> http://localhost:54321
#   in-container worker   -> http://host.docker.internal:54321

services:
  temporal-db:
    image: postgres:15-alpine
    container_name: temporal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5433:5432"
    volumes:
      - temporal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "temporal"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.21.3
    container_name: temporal
    restart: unless-stopped
    depends_on:
      temporal-db:
        condition: service_healthy
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
      - TEMPORAL_CLI_ADDRESS=localhost:7233
    ports:
      - "7234:7233"
    healthcheck:
      test: ["CMD", "true"]
      interval: 10s
      timeout: 5s
      retries: 3

  temporal-ui:
    image: temporalio/ui:2.21.2
    container_name: temporal-ui
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_started
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8080:8080"

  temporal-worker:
    build: ./temporal
    container_name: temporal-worker
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_started
    # Reach the host-bound Supabase API from inside the container.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_TASK_QUEUE=${TEMPORAL_TASK_QUEUE:-main}
      - SUPABASE_URL=${SUPABASE_URL:-http://host.docker.internal:54321}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-dev-service-role-key}

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    depends_on:
      temporal:
        condition: service_started
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL:-http://localhost:54321}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY:-dev-anon-key}
      - VITE_API_URL=${VITE_API_URL:-http://localhost:54321/functions/v1}
    ports:
      - "3000:3000"

volumes:
  temporal-db-data:
