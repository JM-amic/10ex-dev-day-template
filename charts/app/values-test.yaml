# Test profile for charts/app
# Intended namespace: <TEST_NAMESPACE> (use: helm install/upgrade ... -n <TEST_NAMESPACE>)

frontend:
  replicaCount: 2
  image:
    # Keep test deployments on immutable CI-produced tags.
    # Replace <git-sha> during deployment automation.
    tag: "test-<git-sha>"
    # Digest is set at deploy time to pin the exact promoted image.
    # When set, the image is referenced as repo@sha256:… (tag is kept for audit).
    digest: ""
    pullPolicy: IfNotPresent
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: frontend.<TEST_DOMAIN>
        paths:
          - path: /
            pathType: Prefix
  resources:
    requests:
      cpu: 150m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    supabaseUrl: "https://supabase.<TEST_DOMAIN>"
    apiUrl: "https://api.<TEST_DOMAIN>/functions/v1"
  secrets:
    supabaseAnonKey:
      secretName: "frontend-secrets-<TEST_NAMESPACE>"
      key: "VITE_SUPABASE_ANON_KEY"

temporalWorker:
  replicaCount: 1
  image:
    # Keep test deployments on immutable CI-produced tags.
    # Replace <git-sha> during deployment automation.
    tag: "test-<git-sha>"
    # Digest is set at deploy time to pin the exact promoted image.
    digest: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 150m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 512Mi
  temporal:
    address: "temporal-frontend.temporal.svc.cluster.local:7233"
    namespace: "<TEST_NAMESPACE>"
    taskQueue: "<TEST_NAMESPACE>-main"
  supabase:
    url: "https://supabase.<TEST_DOMAIN>"
  secrets:
    supabaseServiceRoleKey:
      secretName: "temporal-worker-secrets-<TEST_NAMESPACE>"
      key: "SUPABASE_SERVICE_ROLE_KEY"

opsApi:
  replicaCount: 1
  image:
    # Keep test deployments on immutable CI-produced tags.
    # Replace <git-sha> during deployment automation.
    tag: "test-<git-sha>"
    # Digest is set at deploy time to pin the exact promoted image.
    digest: ""
    pullPolicy: IfNotPresent
  temporal:
    address: "temporal-frontend.temporal.svc.cluster.local:7233"
    namespace: "<TEST_NAMESPACE>"
  supabase:
    url: "https://supabase.<TEST_DOMAIN>"
  secrets:
    supabaseServiceRoleKey:
      secretName: "temporal-worker-secrets-<TEST_NAMESPACE>"
      key: "SUPABASE_SERVICE_ROLE_KEY"
